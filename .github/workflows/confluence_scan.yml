name: Confluence Scanner

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST — market open
    - cron: '30 5 * * 1-5'   # 11:00 AM IST — mid morning
    - cron: '30 7 * * 1-5'   # 1:00 PM IST — post lunch
    - cron: '0 9 * * 1-5'    # 2:30 PM IST — pre close
  workflow_dispatch:

jobs:
  confluence:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install libraries
      run: pip install yfinance ta pandas requests gspread google-auth feedparser pytz

    - name: Run Confluence Scanner
      env:
        GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python confluence_scanner.py
