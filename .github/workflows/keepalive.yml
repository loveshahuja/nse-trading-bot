name: Keep Workflows Active

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Keep workflows active
      run: |
        echo "Keeping all workflows active — $(date)"
        echo "This prevents GitHub from disabling scheduled workflows after 60 days of inactivity"
