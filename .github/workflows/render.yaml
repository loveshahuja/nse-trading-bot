services:
  - type: web
    name: lovesh-trading-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_server.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
